server:
  port: 8097

spring:
  application:
    name: reporting-admin-service
  datasource:
    url: jdbc:postgresql://localhost:5432/hacnation?currentSchema=reporting_admin_db
    username: ${DB_USERNAME:hacnation}
    password: ${DB_PASSWORD:hacnation123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: reporting_admin_db
  flyway:
    enabled: true
    schemas: reporting_admin_db
    baseline-on-migrate: true
    locations: classpath:db/migration
  config:
    import: optional:configserver:http://localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.hacnation: INFO
