server:
  port: 8080

spring:
  application:
    name: gateway-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/hacnation}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/hacnation}/protocol/openid-connect/certs
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:hacnation}
  client-id: ${KEYCLOAK_CLIENT_ID:hacnation-backend}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    urls:
      - name: 1. Identite Patient (8081)
        url: http://localhost:8081/v3/api-docs
      - name: 2. DME & FHIR (8082)
        url: http://localhost:8082/v3/api-docs
      - name: 3. RDV & Agenda (8083)
        url: http://localhost:8083/v3/api-docs
      - name: 4. File Attente QR (8084)
        url: http://localhost:8084/v3/api-docs
      - name: 5. Consultation (8085)
        url: http://localhost:8085/v3/api-docs
      - name: 6. Prescription (8086)
        url: http://localhost:8086/v3/api-docs
      - name: 7. Laboratoire (8087)
        url: http://localhost:8087/v3/api-docs
      - name: 8. Pharmacie (8088)
        url: http://localhost:8088/v3/api-docs
      - name: 9. Facturation (8089)
        url: http://localhost:8089/v3/api-docs
      - name: 10. Caisse & Mobile Money (8090)
        url: http://localhost:8090/v3/api-docs
      - name: 11. Accueil & Admission (8091)
        url: http://localhost:8091/v3/api-docs
      - name: 12. Hospitalisation (8092)
        url: http://localhost:8092/v3/api-docs
      - name: 13. Urgences & Triage (8093)
        url: http://localhost:8093/v3/api-docs
      - name: 14. Soins Infirmiers (8094)
        url: http://localhost:8094/v3/api-docs
      - name: 15. Bloc Operatoire (8095)
        url: http://localhost:8095/v3/api-docs
      - name: 16. Notifications (8096)
        url: http://localhost:8096/v3/api-docs
      - name: 17. Reporting & Admin (8097)
        url: http://localhost:8097/v3/api-docs
    urls-primary-name: 1. Identite Patient (8081)

logging:
  level:
    com.hacnation: INFO
    org.springframework.security: DEBUG

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
