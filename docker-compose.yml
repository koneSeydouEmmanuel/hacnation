services:
  postgres:
    image: postgres:16-alpine
    container_name: hacnation-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hacnation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hacnation123}
      POSTGRES_DB: ${POSTGRES_DB:-hacnation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hacnation}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: hacnation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: hacnation-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-hacnation}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-hacnation123}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: 8080
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | head -5"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka:
    image: bitnami/kafka:3.9
    container_name: hacnation-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  discovery-server:
    build:
      context: ./backend
      dockerfile: discovery-server/Dockerfile
    container_name: hacnation-discovery-server
    ports:
      - "8761:8761"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx128m"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  config-server:
    build:
      context: ./backend
      dockerfile: config-server/Dockerfile
    container_name: hacnation-config-server
    ports:
      - "8888:8888"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx128m"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    container_name: hacnation-gateway
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m"
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/hacnation
      KEYCLOAK_AUTH_URL: http://keycloak:8080
      KEYCLOAK_REALM: hacnation
      KEYCLOAK_CLIENT_ID: hacnation-backend
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  patient-identity:
    build:
      context: ./backend
      dockerfile: patient-identity-service/Dockerfile
    container_name: hacnation-patient-identity
    ports:
      - "8081:8081"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hacnation?currentSchema=patient_identity_db
      DB_USERNAME: ${DB_USERNAME:-hacnation}
      DB_PASSWORD: ${DB_PASSWORD:-hacnation123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
